name: Run start.py every 5 minutes on weekdays

on:
  schedule:
    # 周一 10:23-12:05, 17:53-19:35
    - cron: "23,28,33,38,43,48,53,58 2 * * 1"
    - cron: "*/5 3 * * 1"
    - cron: "0,5 4 * * 1"
    - cron: "53,58 9 * * 1"
    - cron: "*/5 10-11 * * 1"
    - cron: "0,5,10,15,20,25,30,35 12 * * 1"

    # 周二 08:23-12:05, 17:53-19:35
    - cron: "23,28,33,38,43,48,53,58 0 * * 2"
    - cron: "*/5 1-3 * * 2"
    - cron: "0,5 4 * * 2"
    - cron: "53,58 9 * * 2"
    - cron: "*/5 10-11 * * 2"
    - cron: "0,5,10,15,20,25,30,35 12 * * 2"

    # 周三 08:23-19:35
    - cron: "23,28,33,38,43,48,53,58 0 * * 3"
    - cron: "*/5 1-11 * * 3"
    - cron: "0,5,10,15,20,25,30,35 12 * * 3"

    # 周四 08:23-19:35
    - cron: "23,28,33,38,43,48,53,58 0 * * 4"
    - cron: "*/5 1-11 * * 4"
    - cron: "0,5,10,15,20,25,30,35 12 * * 4"

    # 周五 08:23-15:05
    - cron: "23,28,33,38,43,48,53,58 0 * * 5"
    - cron: "*/5 1-6 * * 5"
    - cron: "0,5 7 * * 5"

    # 周六 13:23-19:35
    - cron: "23,28,33,38,43,48,53,58 5 * * 6"
    - cron: "*/5 6-11 * * 6"
    - cron: "0,5,10,15,20,25,30,35 12 * * 6"

    # 周日 10:23-17:00
    - cron: "23,28,33,38,43,48,53,58 2 * * 0"
    - cron: "*/5 3-8 * * 0"
    - cron: "0 9 * * 0"

  workflow_dispatch:

# 等待前面任务执行完成
concurrency:
  group: scheduled-task
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # 允许推送更改

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        run: python start.py
        env:
            SESSION: ${{ secrets.SESSION }}
#            EMAIL_USER: ${{ secrets.EMAIL_USER }}
#            EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
#            TO_EMAIL: ${{ secrets.TO_EMAIL }}
#            EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
#            EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
            AI_KEY: ${{ secrets.AI_KEY }}
            ENNCY_KEY: ${{ secrets.ENNCY_KEY }}
            FILTERED_COURSES: ${{ secrets.FILTERED_COURSES }}


      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto update logs" || echo "No changes to commit"
          git push origin $(git rev-parse --abbrev-ref HEAD)
